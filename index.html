<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>StudyFlow</h1>
      <p>Your simple student productivity app</p>
      <button id="themeToggle">Toggle Dark Mode</button>
    </header>

    <section class="card">
      <h2>Progress</h2>
      <p>Total Tasks: <span id="totalTasks">0</span></p>
      <p>Completed Tasks: <span id="completedTasks">0</span></p>
    </section>

    <section class="card">
      <h2>Add Task</h2>
      <div class="task-input">
        <input type="text" id="taskInput" placeholder="Enter a study task..." />
        <button id="addTaskBtn">Add</button>
      </div>
    </section>

    <section class="card">
      <h2>Tasks</h2>
      <ul id="taskList"></ul>
    </section>

    <section class="card">
      <h2>Pomodoro Timer</h2>
      <div class="timer-box">
        <h3 id="timerDisplay">25:00</h3>
        <div class="timer-buttons">
          <button id="startTimer">Start</button>
          <button id="pauseTimer">Pause</button>
          <button id="resetTimer">Reset</button>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>Quick Notes</h2>
      <textarea id="notesArea" placeholder="Write your notes here..."></textarea>
      <button id="saveNotesBtn" class="full-btn">Save Notes</button>
    </section>

    <section class="card">
      <h2>Backup</h2>
      <div class="timer-buttons">
        <button id="exportBtn">Export Data</button>
        <input type="file" id="importFile" accept=".json" />
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
