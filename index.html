<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyFlow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>StudyFlow</h1>
      <button id="themeToggle">Toggle Theme</button>
    </header>

    <div class="main-content">
      <section class="card progress-section">
        <h2>📊 Progress</h2>
        <div class="stats">
          <div class="stat-item">
            <span class="stat-number" id="totalTasks">0</span>
            <span class="stat-label">Total Tasks</span>
          </div>
          <div class="stat-item">
            <span class="stat-number" id="completedTasks">0</span>
            <span class="stat-label">Completed</span>
          </div>
        </div>
      </section>

      <section class="card timer-section">
        <h2>⏱️ Pomodoro Timer</h2>
        <div class="timer-box">
          <h3 id="timerDisplay">25:00</h3>
          <div class="timer-buttons">
            <button id="startTimer">Start</button>
            <button id="pauseTimer">Pause</button>
            <button id="resetTimer">Reset</button>
          </div>
        </div>
      </section>

      <section class="card add-task-section">
        <h2>➕ Add New Task</h2>
        <div class="task-input">
          <input type="text" id="taskInput" placeholder="What do you need to study?" />
          <button id="addTaskBtn">Add Task</button>
        </div>
      </section>

      <section class="card notes-section">
        <h2>📝 Quick Notes</h2>
        <textarea id="notesArea" placeholder="Jot down your thoughts..."></textarea>
        <button id="saveNotesBtn" class="full-btn">Save Notes</button>
      </section>

      <section class="card tasks-section">
        <h2>📋 Your Tasks</h2>
        <ul id="taskList"></ul>
      </section>

      <section class="card backup-section">
        <h2>💾 Data Management</h2>
        <div class="backup-controls">
          <button id="exportBtn">Export Data</button>
          <input type="file" id="importFile" accept=".json" />
        </div>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
